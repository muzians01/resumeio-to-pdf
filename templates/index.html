<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <title>Resume.io to PDF</title>

    <style>
        body {
            font-family: "Inter", sans-serif;
        }

        .container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            padding: 2rem;
        }

        .links {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
        }

        .title {
            font-size: 3rem;
        }

        .resume_form {
            display: flex;
            align-items: center;
            flex-direction: column;
            min-width: 30rem;
            gap: 2rem;
        }

        .resume {
            width: 100%;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #666666;
            font-family: "Inter", sans-serif;
            font-size: 1rem;
            resize: vertical;
            min-height: 17rem;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            border: none;
            font-size: 1rem;
            font-family: "Inter", sans-serif;
            background-color: #1c1c1c;
            color: #ffffff;
            cursor: pointer;
            width: 12rem;
            height: 3.5rem;
        }

        .btn:disabled {
            background-color: #999999;
            cursor: not-allowed;
        }

        #loader {
            display: none;
        }

        .error {
            margin-right: auto;
            display: none;
            color: red;
            font-size: 0.8rem;
        }

        .error-border {
            border: 1px solid red;
        }

        .spinner_V8m1 {
            transform-origin: center;
            animation: spinner_zKoa 2s linear infinite;
        }

        .spinner_V8m1 circle {
            stroke-linecap: round;
            animation: spinner_YpZS 1.5s ease-in-out infinite;
        }

        @keyframes spinner_zKoa {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spinner_YpZS {
            0% {
                stroke-dasharray: 0 150;
                stroke-dashoffset: 0;
            }
            47.5% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -16;
            }
            95%, 100% {
                stroke-dasharray: 42 150;
                stroke-dashoffset: -59;
            }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake {
            animation: shake 0.1s;
            animation-iteration-count: 1;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="links">
        <iframe  src="https://ghbtns.com/github-btn.html?user=felipeall&repo=resumeio-to-pdf&type=star&count=true&size=large" frameborder="0" scrolling="0" width="130" height="30" title="GitHub"></iframe>
        <a href="https://www.buymeacoffee.com/felipeall" target="_blank"><img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" style="height: 40px !important;width: 160px !important;"></a>
    </div>
    <h1 class="title">Resume.io to PDF</h1>
    <form method="post" action="/download" class="resume_form" id="downloadForm">
        <textarea class="resume" name="document" rows="6" placeholder="Paste your resume document JSON" aria-label="Document JSON"></textarea>
        <span class="error" id="document-error">Please paste a valid resume document JSON</span>
        <button id="submit-btn" class="btn" type="submit" disabled><span id="submit-text">Download</span>
            <svg id="loader" width="23" height="23" stroke="#fff" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <g class="spinner_V8m1">
                    <circle cx="12" cy="12" r="9.5" fill="none" stroke-width="3"></circle>
                </g>
            </svg>
        </button>
    </form>
</div>

<script>
    window.addEventListener('pageshow', function() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('submit-text').style.display = 'block';
    });

    const downloadForm = document.getElementById("downloadForm");
    const documentInput = document.querySelector('textarea[name="document"]');
    const documentError = document.getElementById('document-error');
    const submitBtn = document.getElementById('submit-btn');

    documentInput.addEventListener('input', function () {
        const doc = this.value.trim();
        let valid = false;
        if (doc) {
            try { JSON.parse(doc); valid = true; } catch {}
        }
        submitBtn.disabled = !valid;
        if (valid) {
            documentError.style.display = 'none';
            documentInput.classList.remove('error-border');
        } else if (doc) {
            documentError.style.display = 'block';
            documentInput.classList.add('error-border');
        } else {
            documentError.style.display = 'none';
            documentInput.classList.remove('error-border');
        }
    });

    downloadForm.addEventListener("submit", function (e) {
        e.preventDefault();
        document.getElementById('submit-text').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        this.submit();
    });
</script>
</body>
</html>
